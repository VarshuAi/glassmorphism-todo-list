<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism To-Do Board — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">📝</span>
                <div class="title-col">
                    <h1>Glassmorphism To-Do Board</h1>
                    <p class="tagline">Frosted glass-styled interactive schedule and task planner.</p>
                </div>
            </div>
            <div class="badge">productivity</div>
        </header>

        <main class="workspace-card">
            
            <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                <input type="text" id="todo-input" placeholder="Add a new task...">
                <button class="btn" onclick="addTodoItem()">Add</button>
            </div>
            <ul id="todo-list" style="list-style: none; padding: 0;"></ul>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
